name: Update counters (paused until Fillout)

on:
  workflow_dispatch:        # reactivar quan els formularis Fillout estiguin connectats

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update data.json
        run: |
          echo "::notice::Counters pausats: el formulari oficial ara és Fillout (usuari voluntaris)."
          echo "::notice::Connectar Fillout abans de reactivar l'actualització automàtica."

      - name: Commit canvis si hi han
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data.json; then
            echo "Sense canvis a data.json"
          else
            git add data.json
            git commit -m "chore(data): auto-update counters from JotForm [skip ci]"
            git push
            echo "Commit i push fets"
          fi
